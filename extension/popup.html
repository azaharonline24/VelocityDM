<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 { font-size: 18px; margin: 0 0 12px 0; }
    .status { padding: 8px; border-radius: 6px; margin-bottom: 12px; }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #0056b3; }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .footer { text-align: center; font-size: 11px; color: #999; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>⚡ VelocityDM</h1>
  <div id="status" class="status disconnected">Checking connection...</div>

  <input type="text" id="urlInput" placeholder="Paste URL to download...">
  <button id="downloadBtn">Download with VelocityDM</button>

  <div class="footer">VelocityDM Integration v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
